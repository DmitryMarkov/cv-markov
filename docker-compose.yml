services:
  test:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /work
    volumes:
      - .:/work
      - playwright-node-modules:/work/node_modules
    environment:
      HOST_UID: ${HOST_UID:-1000}
      HOST_GID: ${HOST_GID:-1000}
      TEST_FLAGS: ${TEST_FLAGS:-}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        trap 'chown -R "$$HOST_UID:$$HOST_GID" /work/build /work/playwright-report /work/test-results /work/tests/__screenshots__ 2>/dev/null || true' EXIT
        corepack enable
        yarn install --immutable
        yarn build
        yarn test:run $$TEST_FLAGS

volumes:
  playwright-node-modules:
