services:
  test:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_dir: /work
    volumes:
      - .:/work
      - playwright-node-modules:/work/node_modules
    command: >
      sh -c "
      corepack enable &&
      yarn install --immutable &&
      yarn build &&
      yarn test:run ${TEST_FLAGS:-}
      "

volumes:
  playwright-node-modules:
