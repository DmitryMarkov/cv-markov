name: CI Pipeline
on: [push]

env:
  NODE_VERSION: 24.x

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
      - run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
      - run: yarn css

  editor-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
      - run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
      - run: yarn editorconfig


  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
      - run: corepack enable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Install dependencies
        run: yarn install --immutable
      - run: yarn html

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
      - run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
      - run: yarn markdown

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
      - run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
      - run: yarn security-audit

  test:
    #    turn off for now
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x
          cache: 'yarn'
      - run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable
      - run: yarn test
      - uses: actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: diff
          path: test/screenshots
